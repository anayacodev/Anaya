<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart - Anaya's Baking Company</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Anaya's Baking Company</h1>
    <p>A Kid Owned Baking Business</p>
  </header>

  <nav>
    <a href="index.html#about">About</a>
    <a href="index.html#gallery">Photos</a>
    <a href="index.html#menu">Menu</a>
    <a href="cart.html">Cart <span class="cart-count">0</span></a>
  </nav>

  <section id="cart-page" class="product-detail">
    <h2 class="section-title">Your Cart</h2>

    <div class="cart-content">
      <div id="cart-empty" class="cart-empty">Your cart is empty.</div>
      <div id="cart-table"></div>

      <div class="cart-summary">
        <span>Total:</span>
        <strong id="cart-total">$0.00</strong>
      </div>

      <button class="button" id="proceed-to-checkout" type="button">Proceed to Checkout</button>
    </div>
  </section>

  <footer>
    <p>© 2026 Anaya Baking Company</p>
    <p>Homemade treats for every sweet tooth</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
